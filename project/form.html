<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Submit a product review with ratings, features, and feedback."
    />
    <meta name="author" content="Samson Odunaiya" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/form.css" />
    <script src="scripts/common.js" defer></script>
    <script src="scripts/form.js" defer></script>
    <title>Product Review Form</title>
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <h1>Product Review</h1>
        <p>Share your experience to help other customers.</p>
      </div>
    </header>

    <main class="page">
      <form class="review-form" method="get" action="review.html">
        <section class="form-section">
          <h2>Product Details</h2>

          <label for="product-name">Product Name</label>
          <select id="product-name" name="productName" required>
            <option value="" disabled selected>Select a Product ...</option>
          </select>

          <fieldset class="rating-field">
            <legend>Overall Rating</legend>
            <div class="rating-options">
              <label for="rating-1">
                <input
                  type="radio"
                  id="rating-1"
                  name="overallRating"
                  value="1"
                  required
                />
                <span aria-hidden="true">&#9733;&#9734;&#9734;&#9734;&#9734;</span>
                <span class="sr-only">1 star</span>
              </label>
              <label for="rating-2">
                <input type="radio" id="rating-2" name="overallRating" value="2" required />
                <span aria-hidden="true">&#9733;&#9733;&#9734;&#9734;&#9734;</span>
                <span class="sr-only">2 stars</span>
              </label>
              <label for="rating-3">
                <input type="radio" id="rating-3" name="overallRating" value="3" required />
                <span aria-hidden="true">&#9733;&#9733;&#9733;&#9734;&#9734;</span>
                <span class="sr-only">3 stars</span>
              </label>
              <label for="rating-4">
                <input type="radio" id="rating-4" name="overallRating" value="4" required />
                <span aria-hidden="true">&#9733;&#9733;&#9733;&#9733;&#9734;</span>
                <span class="sr-only">4 stars</span>
              </label>
              <label for="rating-5">
                <input type="radio" id="rating-5" name="overallRating" value="5" required />
                <span aria-hidden="true">&#9733;&#9733;&#9733;&#9733;&#9733;</span>
                <span class="sr-only">5 stars</span>
              </label>
            </div>
          </fieldset>

          <label for="install-date">Date of Installation</label>
          <input type="date" id="install-date" name="installDate" required />
        </section>

        <section class="form-section">
          <h2>Useful Features</h2>
          <p class="helper">Check all that apply.</p>

          <div class="checkbox-grid">
            <label for="feature-durability">
              <input
                type="checkbox"
                id="feature-durability"
                name="features"
                value="Durability"
              />
              Durability
            </label>
            <label for="feature-ease">
              <input type="checkbox" id="feature-ease" name="features" value="Ease of Use" />
              Ease of Use
            </label>
            <label for="feature-performance">
              <input
                type="checkbox"
                id="feature-performance"
                name="features"
                value="Performance"
              />
              Performance
            </label>
            <label for="feature-design">
              <input type="checkbox" id="feature-design" name="features" value="Design" />
              Design
            </label>
          </div>
        </section>

        <section class="form-section">
          <h2>Written Review</h2>
          <label for="review">Review (Optional)</label>
          <textarea
            id="review"
            name="review"
            rows="5"
            placeholder="Share details about your experience..."
          ></textarea>

          <label for="user-name">Your Name (Optional)</label>
          <input
            type="text"
            id="user-name"
            name="userName"
            autocomplete="name"
            placeholder="e.g., Alex Johnson"
          />
        </section>

        <input type="submit" class="submit-btn" value="Post Review" />
      </form>
    </main>

    <footer class="site-footer">
      <p>&copy;<span id="year"></span> Samson Odunaiya | Product Reviews</p>
      <p>Last Modification: <span id="last-modified"></span></p>
    </footer>
  </body>
</html>
