<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Product review submission confirmation."
    />
    <meta name="author" content="Samson Odunaiya" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Work+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="Product review submission confirmation."
    />
    <meta name="author" content="Samson  Odunaiya" />
    <link rel="stylesheet" href="styles/form.css" />
    <script src="scripts/common.js" defer></script>
    <script src="scripts/review.js" defer></script>
    <title>Review Submitted</title>
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <h1>Thank You</h1>
        <p>Your review has been submitted.</p>
      </div>
    </header>

    <main class="page">
      <section class="confirmation-card">
        <h2>Submission Complete</h2>
        <p>
          We appreciate your feedback. Your insights help us improve and help
          other customers choose the right product.
        </p>
        <p class="review-count">
          Reviews submitted so far: <span id="review-count">0</span>
        </p>
        <a class="link-button" href="form.html">Submit another review</a>
      </section>
    </main>

    <footer class="site-footer">
      <p>&copy;<span id="year"></span> Samson Odunaiya | Product Reviews</p>
      <p>Last Modification: <span id="last-modified"></span></p>
    </footer>
  </body>
