<h1>📆 Next 6 Days of the Week</h1>
<p id="today"></p>
<h2>Future Days of the Week</h2>
<ul></ul>

<style>
  body {
    margin: 0.5rem auto;
    padding: 0;
    width: 500px;
  }

  h1,
  #today {
    text-align: center;
    color: darkblue;
  }
  p {
    background-color: #eee;
    border: 1px solid #999;
    padding: 0.35rem;
  }
</style>

<script>
  const numberOfDays = 6; // variable days in future setting
  const options = { weekday: "long" }; // Intl.DateTimeFormat vs. short, etc.

  // BEGIN
  const today = new Date();
  // TODAY test output
  let todaystring = new Intl.DateTimeFormat("en-US", options).format(today);
  document.getElementById("today").innerHTML =
    `Today is <strong>${todaystring}</strong>`;

  // next n days
  for (let i = 1; i <= numberOfDays; i++) {
    const nextday = new Date();
    nextday.setDate(today.getDate() + i);
    let nextdaystring = new Intl.DateTimeFormat("en-US", options).format(
      nextday,
    );
    const item = document.createElement("li"); // list item
    item.textContent = nextdaystring;
    document.querySelector("ul").appendChild(item);
  }
</script>
